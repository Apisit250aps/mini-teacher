services:
  app:
    container_name: mini-teacher
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3000'
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./backup:/backup
    restart: always

  nginx:
    image: nginx:alpine
    container_name: proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: always

  postgres:
    image: postgres:latest
    container_name: database
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backup:/backup
    env_file:
      - .env
    expose:
      - '5432'
    restart: unless-stopped

volumes:
  postgres-data:
